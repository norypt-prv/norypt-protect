name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  EXPECTED_CERT_SHA256: 13502510a5b50d59bf7823cbe596b88c7b4cb54b41bc217aac7c251917536e95

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest

      - name: Install required SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" >/dev/null

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Decode keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 -d > /tmp/norypt-protect.keystore

      - name: Assemble release APK
        env:
          RELEASE_KEYSTORE_PATH: /tmp/norypt-protect.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Verify APK signature matches pinned fingerprint
        run: |
          set -euo pipefail
          APK=app/build/outputs/apk/release/app-release.apk
          BUILD_TOOLS_DIR="$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)"
          APKSIGNER="$BUILD_TOOLS_DIR/apksigner"
          "$APKSIGNER" verify --print-certs "$APK" | tee /tmp/apksigner.txt
          ACTUAL=$(grep -i "certificate SHA-256 digest" /tmp/apksigner.txt | head -1 | awk '{print $NF}')
          if [ "$ACTUAL" != "$EXPECTED_CERT_SHA256" ]; then
            echo "::error::APK cert SHA-256 mismatch — got $ACTUAL, expected $EXPECTED_CERT_SHA256"
            exit 1
          fi
          echo "Cert fingerprint matches the pinned value."

      - name: Export public certificate
        env:
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
        run: |
          keytool -export -rfc \
            -alias "$RELEASE_KEY_ALIAS" \
            -keystore /tmp/norypt-protect.keystore \
            -storetype PKCS12 \
            -storepass "$RELEASE_KEYSTORE_PASSWORD" \
            -file norypt-protect-release.cert.pem

      - name: Stage release artifacts
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          APK_SRC=app/build/outputs/apk/release/app-release.apk
          APK_OUT="norypt-protect-${VERSION}.apk"
          cp "$APK_SRC" "$APK_OUT"
          SHA=$(sha256sum "$APK_OUT" | awk '{print $1}')
          printf '%s  %s\n' "$SHA" "$APK_OUT" > "$APK_OUT.sha256"
          {
            echo "VERSION=$VERSION"
            echo "APK_OUT=$APK_OUT"
            echo "APK_SHA256=$SHA"
          } >> "$GITHUB_ENV"

      - name: Render release notes
        run: |
          set -euo pipefail
          cat > release-body.md <<EOF
          **Norypt Protect ${VERSION}** — local-only Android privacy and emergency security, built by [norypt.com](https://norypt.com).

          No internet permission. No server. No logs. No telemetry. No tracking.

          ## Download

          - APK: \`${APK_OUT}\`
          - Checksum: \`${APK_OUT}.sha256\`
          - Public certificate: \`norypt-protect-release.cert.pem\`

          ## Verify before installing

          Always run both checks. A correct hash alone does not prove the file was signed by Norypt.

          \`\`\`bash
          # 1. Hash check
          sha256sum ${APK_OUT}
          # Expected:
          # ${APK_SHA256}  ${APK_OUT}

          # 2. Signature check (Android SDK build-tools must be on PATH)
          apksigner verify --print-certs ${APK_OUT}
          # The "certificate SHA-256 digest" line must equal:
          # ${EXPECTED_CERT_SHA256}
          \`\`\`

          The same fingerprint is pinned inside the running app. If the cert ever changes, Norypt Protect refuses to launch.

          ## Install (Tier 1 — Device Admin, no PC needed)

          \`\`\`
          adb install ${APK_OUT}
          \`\`\`

          Or open the APK from the phone's file manager. Then in the app: Enable → grant Device Admin in Android Settings.

          ## Promote to Tier 2 — Device Owner (full feature set)

          The phone must have no other Device Owner, no accounts on user 0, no managed profile, and only user 0. A factory reset is the cleanest path to that state.

          \`\`\`bash
          # Confirm no other Device Owner — output must be empty.
          adb shell dpm list-owners

          # Promote.
          adb shell dpm set-device-owner com.norypt.protect/com.norypt.protect.admin.ProtectAdminReceiver

          # Grant the secure-settings write used by the Emergency-SOS auto-disable trigger.
          adb shell pm grant com.norypt.protect android.permission.WRITE_SECURE_SETTINGS
          \`\`\`

          See the [README](https://github.com/norypt-prv/norypt-protect#two-install-tiers--what-each-unlocks) for the full feature breakdown and the Trust-report section for on-device verification.

          ## Reproducible build

          See [docs/reproducible-build.md](https://github.com/norypt-prv/norypt-protect/blob/main/docs/reproducible-build.md) for steps to rebuild this exact APK from source.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Norypt Protect ${{ env.VERSION }}
          body_path: release-body.md
          files: |
            ${{ env.APK_OUT }}
            ${{ env.APK_OUT }}.sha256
            norypt-protect-release.cert.pem
